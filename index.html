<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Budget - Bank Statement Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { text-align: center; padding: 40px 20px; max-width: 600px; }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 36px; color: #27ae60; margin-bottom: 10px; }
        p { font-size: 16px; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        .badge {
            background: rgba(39,174,96,0.15);
            border: 1px solid rgba(39,174,96,0.4);
            border-radius: 20px;
            padding: 8px 20px;
            display: inline-block;
            color: #27ae60;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .secure {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🇮🇳</div>
        <h1>Bharat Budget</h1>
        <p>AI-powered Bank Statement Analyzer for Indians.<br>
        Smart insights for your financial health.</p>
        <div class="badge">🔒 Secure Payments via Razorpay</div>
        <p class="secure">
            Payment processing is handled securely.<br>
            bharatbudgetapp.com © 2026
        </p>
    </div>
</body>
</html>
